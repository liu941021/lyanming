<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>主页</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-size: cover;
        background-position: center;
        height: 100vh;
        background-image: url("jl.jpg");
      }
      /* {
        border: 1px solid black;
      }*/
      .flex {
        display: flex;
      }
      .flex1 {
        flex: 1;
      }
      .font {
        font-size: 50px;
        align-items: center;
        justify-content: center;
        color: #ffea02;
      }
      button {
        background-color: transparent;
        color: black;
        border: none;
        text-align: center;
        cursor: grab;
      }
      button:hover {
        background-color: #cee009;
      }
      .column {
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .text {
        font-size: 30px;
        padding: 20px;
      }
      @media (max-width: 600px) {
        .column1 {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body class="flex column1">
    <div class="flex flex1 font">山虽高，攀则登峰<br />路虽远，行则将至</div>
    <div style="width: 200px" class="flex column">
      <button class="text" onclick="window.location.href = 'zy.html'">
        主页
      </button>
      <button class="text" onclick="window.location.href = 'me.html'">
        关于我
      </button>
      <button class="text" onclick="window.location.href = 'photo.html'">
        相册
      </button>
    </div>
  </body>
</html>
